<section class="card">
  <h1>Album #{{ albumId }} Photos</h1>

  @if (loading) {
    <p>Loading photos...</p>
  } 
  @else if (photos.length === 0) {
    <p>No photos found.</p>
  } 
  @else {
    <div class="grid">
      @for (photo of photos; track photo.id) {
        <article class="photo">
          <img [src]="photo.thumbnailUrl" [alt]="photo.title" />
          <p [title]="photo.title">{{ photo.title }}</p>
        </article>
      }
    </div>
  }

  <button type="button" (click)="backToDetail()">Back</button>
</section>
